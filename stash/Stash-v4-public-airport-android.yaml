# Stash / Clash public airport edition (Android-friendly)
# rebuilt for better Clash Meta for Android compatibility
# key change: region groups use `use:` on proxy-providers instead of include-all

mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
unified-delay: true

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  skip-domain:
    - Mijia Cloud
    - '+.push.apple.com'
    - '+.apple.com'
    - '+.icloud.com'

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://1.0.0.1/dns-query
    - tls://8.8.8.8:853
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - 'localhost.ptlogin2.qq.com'
    - '+.srv.nintendo.net'
    - '+.stun.playstation.net'
    - 'stun.l.google.com'
    - 'stun.cloudflare.com'
    - 'time.apple.com'
    - 'time-ios.apple.com'
    - '*.ntp.org'

http:
  url-rewrite: []
  script: []

proxy-providers:
  花云机场:
    type: http
    url: "https://api-huacloud.dev/sub?target=clash&insert=true&emoji=true&udp=true&clash.doh=true&new_name=true&filename=Flower_SS.yaml&url=https%3A%2F%2Fapi.xmancdn.com%2Fosubscribe.php%3Ftoken2%3Djnyzwgvq-b96e381978yi1ieppa%26sip002%3D1"
    path: ./proxy_providers/huacloud.yaml
    interval: 21600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

  KineticBloom:
    type: http
    url: "https://cdn.kineticbloom.org/?L2Rvd25sb2FkQ29uZmlnL0NsYXNoLmFzcHg/dD1jMjAyMiZlcT13aW5kb3dzJnVyaz0zNDc4ZWJhYi0wYjA2LTRmMjUtYTE5Mi04ZGExYzg5MzU1ZjcmbW09NDE1MzIma3RtbT01eUlZZ1hKSmpOc3BxbUYlMmZmVjhHckElM2QlM2QmMTBmNTIxNTJkNDAwNGNkOQ=="
    path: ./proxy_providers/kineticbloom.yaml
    interval: 21600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  - name: 节点选择
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png
    proxies:
      - 香港节点
      - 日本节点
      - 新加坡节点
      - 美国节点
      - 台湾节点
      - 韩国节点
      - 英国节点
      - DIRECT

  - name: AI服务
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/AI.png
    proxies:
      - 美国节点
      - 日本节点
      - 新加坡节点
      - 香港节点
      - DIRECT

  - name: 谷歌服务
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google.png
    proxies:
      - 日本节点
      - 美国节点
      - 新加坡节点
      - 香港节点
      - DIRECT

  - name: 微软服务
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Microsoft.png
    proxies:
      - DIRECT
      - 日本节点
      - 香港节点

  - name: 苹果服务
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Apple.png
    proxies:
      - DIRECT
      - 日本节点
      - 香港节点

  - name: 流媒体
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png
    proxies:
      - 新加坡节点
      - 日本节点
      - 美国节点
      - 香港节点

  - name: 音乐媒体
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Spotify.png
    proxies:
      - 日本节点
      - 美国节点
      - 香港节点

  - name: TikTok
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/TikTok.png
    proxies:
      - 日本节点
      - 美国节点
      - 新加坡节点

  - name: 社交媒体
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png
    proxies:
      - 日本节点
      - 美国节点
      - 香港节点
      - 新加坡节点
      - DIRECT

  - name: 加密货币
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Cryptocurrency.png
    proxies:
      - 日本节点
      - 香港节点
      - 美国节点
      - DIRECT

  - name: 广告过滤
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Advertising.png
    proxies:
      - REJECT
      - DIRECT

  - name: 漏网之鱼
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Final.png
    proxies:
      - 节点选择
      - 日本节点
      - 香港节点
      - DIRECT

  - name: 香港节点
    type: url-test
    use:
      - 花云机场
      - KineticBloom
    filter: '(?i)(🇭🇰|香港|\bHK\b|Hong\s?Kong|HongKong)'
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 日本节点
    type: url-test
    use:
      - 花云机场
      - KineticBloom
    filter: '(?i)(🇯🇵|日本|\bJP\b|Japan)'
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 新加坡节点
    type: url-test
    use:
      - 花云机场
      - KineticBloom
    filter: '(?i)(🇸🇬|新加坡|\bSG\b|Singapore)'
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 美国节点
    type: url-test
    use:
      - 花云机场
      - KineticBloom
    filter: '(?i)(🇺🇸|美国|\bUS\b|\bUSA\b|United\sStates|America|Los\sAngeles|Seattle|San\sJose|San\sFrancisco|Chicago|New\sYork)'
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 台湾节点
    type: url-test
    use:
      - 花云机场
      - KineticBloom
    filter: '(?i)(🇹🇼|台湾|\bTW\b|Taiwan)'
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 韩国节点
    type: url-test
    use:
      - 花云机场
      - KineticBloom
    filter: '(?i)(🇰🇷|韩国|\bKR\b|Korea|Seoul)'
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Korea.png
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 英国节点
    type: url-test
    use:
      - 花云机场
      - KineticBloom
    filter: '(?i)(🇬🇧|英国|\bUK\b|United\sKingdom|Britain|London)'
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_Kingdom.png
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

