rules:
# 1. 基线直连
- IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
- IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
- IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
- IP-CIDR,10.0.0.0/8,DIRECT,no-resolve

# 2. 业务核心规则 (优先级最高)
- RULE-SET,TradingView,TradingView
- RULE-SET,CryptoWallet,交易钱包
- RULE-SET,AIOverseas,AI
- RULE-SET,StreamingOverseas,流媒体
- RULE-SET,SocialOverseas,社交平台
- RULE-SET,GamesOverseas,游戏平台
- RULE-SET,AutoBackfill,🚀 节点选择

# 3. 基础服务规则 (BM7 - 只保留高质量源)
- RULE-SET,BM7Telegram,Telegram
- RULE-SET,BM7Google,Google
- RULE-SET,BM7Microsoft,Microsoft
- RULE-SET,BM7Apple,Apple

# 4. 国内直连兜底 (关键修正顺序)
- RULE-SET,BM7China,DIRECT
- GEOIP,CN,DIRECT

# 5. 最终兜底
- MATCH,🚀 节点选择
