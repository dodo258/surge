# 代理组
proxy-groups:
  # 漏网之鱼
  - name: 🐟 漏网之鱼
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png
    proxies:
      - 🚀 节点选择
      - DIRECT

  # 节点选择
  - name: 🚀 节点选择
    type: select
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Rocket.png
    proxies:
      - ♻️ 自动选择
      - HongKong
      - TaiWan
      - Japan
      - Singapore
      - America
      - Korea
      - AllServer
      - DIRECT

  # 自动选择
  - name: ♻️ 自动选择
    type: url-test
    include-all: true
    exclude-filter: '(?i)(群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新，作者|加入)'
    url: http://www.google.com/generate_204
    interval: 300

  # 交易钱包
