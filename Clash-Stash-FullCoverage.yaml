# Clash-Stash 终极配置 · Ultimate Edition
# 机场：🏢 机场A / 🏢 机场B / 🏢 机场C
# VPS：🖥 MyVPS（新加坡，链式出口，搭好后取消注释相关行）
# 基于 Stash 官方文档（stash.wiki）逐字段核查

# ── 基础设置 ──────────────────────────────────────────────────
port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: warning
external-controller: :9090
ipv6: false

# ── 连接优化 ──────────────────────────────────────────────────
tcp-concurrency: 8
http-timeout: 30000

# ── DNS ──────────────────────────────────────────────────────
# nameserver：只用国内 DNS，国内域名解析最准
# fallback：境外域名兜底 DNS，fallback-filter 防止国内域名走 fallback 被污染
dns:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - localhost.ptlogin2.qq.com
    - "*.weixin.qq.com"
    - "*.wx.qq.com"
    - "*.alipay.com"
    - "*.taobao.com"
    - "*.jd.com"
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://dns.alidns.com/dns-query
  fallback:
    - 8.8.8.8
    - 1.1.1.1
    - https://dns.cloudflare.com/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4


# ══════════════════════════════════════════════════════════════
# proxy-providers — 机场订阅
#
# ⚠️ 重要：Stash/Clash 需要 Clash 格式订阅，不能用 Surge 格式链接
#
# 获取 Clash 格式订阅的方法：
#   方法1：登录机场官网，找「Clash」或「Clash Meta」订阅链接
#   方法2：如果只有通用链接，在链接末尾加 &target=clash
#   方法3：通过 Sub-Store 转换（新建订阅 → 目标格式选 Clash）
#
# 三个机场的订阅链接已预填（需要替换为 Clash 格式版本）
# ══════════════════════════════════════════════════════════════
proxy-providers:
  🏢 机场A:
    type: http
    # 原 Surge 链接：target=surge → 改为 target=clash
    url: "请在此填写自己的订阅链接"
    interval: 3600
    path: ./providers/proxy/airport-a.yaml
    health-check:
      enable: true
      url: http://www.google.com/generate_204
      interval: 300

  🏢 机场B:
    type: http
    # 原 Surge 链接：type=surge → 改为 type=clash
    url: "请在此填写自己的订阅链接"
    interval: 3600
    path: ./providers/proxy/airport-b.yaml
    health-check:
      enable: true
      url: http://www.google.com/generate_204
      interval: 300

  🏢 机场C:
    type: http
    # 机场C的链接是 Base64 编码，解码后是 Surge 格式，需要向机场获取 Clash 格式链接
    # 临时保留原链接，如无法使用请联系机场客服获取 Clash 订阅链接
    url: "请在此填写自己的订阅链接"
    interval: 3600
    path: ./providers/proxy/airport-c.yaml
    health-check:
      enable: true
      url: http://www.google.com/generate_204
      interval: 300


# ══════════════════════════════════════════════════════════════
# proxies — VPS 节点（链式代理出口）
#
# 链式代理原理：
#   设备 → 机场专线节点（穿越 GFW）→ 你的 VPS（干净出口 IP）→ 目标网站
#
# Stash 官方推荐使用 dialer-proxy（比旧版 relay 更强，支持 TCP+UDP）
# dialer-proxy 引用策略组，可动态选择机场入口地区
#
# VPS 搭好后取消注释，填入真实参数：
#   server: 你的VPS_IP
#   port: 443
#   uuid: 你的UUID
#   servername: 你的SNI或留空
#
# ══════════════════════════════════════════════════════════════
proxies: []
# proxies:
#   - name: 🖥 MyVPS
#     type: vless
#     server: 你的VPS_IP
#     port: 443
#     uuid: 你的UUID
#     tls: true
#     skip-cert-verify: false
#     network: tcp
#     # dialer-proxy 指向链式上游策略组，可动态切换入口地区
#     dialer-proxy: 🔗 链式上游


