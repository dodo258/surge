# 规则
rules:
  # 本地网络
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve

  # 用户直连白名单 (香港银行等)
  - RULE-SET,MyDirect,DIRECT

  # 国内直连
  - RULE-SET,BM7China,DIRECT
  - GEOIP,CN,DIRECT

  # 加密货币
  - RULE-SET,Binance,交易钱包
  - RULE-SET,OKX,交易钱包

  # AI
  - RULE-SET,OpenAI,AI
  - RULE-SET,Claude,AI
  - RULE-SET,Gemini,AI

  # 流媒体
  - RULE-SET,Netflix,流媒体
  - RULE-SET,Disney,流媒体
  - RULE-SET,YouTube,流媒体
  - RULE-SET,TikTok,流媒体

  # 社交
  - RULE-SET,Telegram,社交平台
  - RULE-SET,Discord,社交平台
  - RULE-SET,Twitter,社交平台
  - RULE-SET,Facebook,社交平台

  # 购物支付
  - RULE-SET,PayPal,购物支付
  - RULE-SET,Amazon,购物支付

  # 游戏
  - RULE-SET,Steam,游戏平台
  - RULE-SET,Epic,游戏平台
  - RULE-SET,PlayStation,游戏平台
  - RULE-SET,Xbox,游戏平台
  - RULE-SET,Nintendo,游戏平台

  # 基础设施
  - RULE-SET,Google,Google
  - RULE-SET,Microsoft,Microsoft
  - RULE-SET,Apple,Apple

  # 广告拦截
  - RULE-SET,BanAD,REJECT

  # 兜底
  - MATCH,🐟 漏网之鱼