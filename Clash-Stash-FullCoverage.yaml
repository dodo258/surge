# Clash-Stash 全量配置
# 基于 Surge 配置重构
# 优化：扁平化策略组 + 命名一致 + 流媒体偏好 SG/HK/TW

port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: warning
external-controller: :9090

# 连接优化
tcp-concurrency: 8
http-timeout: 30000

# DNS 配置
dns:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://dns.cloudflare.com/dns-query
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - https://dns.alidns.com/dns-query
    - https://dns.cloudflare.com/dns-query
    - 8.8.8.8
    - 1.1.1.1
  fallback-filter:
    geoip: true

# 代理节点
proxy-providers:
  🚀 节点:
    type: http
    url: https://sub.store/download/collection/all?target=Clash
    interval: 86400
    health-check:
      url: http://www.gstatic.com/generate_204
      interval: 300

