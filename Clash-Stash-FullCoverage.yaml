  # ── 主节点选择 ──────────────────────────────────────────────
  - name: 🚀 节点选择
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Rocket.png
    proxies:
      - ♻️ 自动选择
      - 🌐 地区锁定
      - 🚀 手动切换
      - DIRECT

  - name: ♻️ 自动选择
    type: url-test
    include-all: true
    url: http://www.google.com/generate_204
    interval: 300
    lazy: true
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png

  - name: 🚀 手动切换
    type: select
    include-all: true
