# 代理组
proxy-groups:
  # 节点选择
  - name: 🚀 手动切换
    type: select
    proxies:
      - 🚀 节点

  - name: ♻️ 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - 🚀 节点

  # 地区节点
  - name: 🇭🇰 香港
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - 🚀 节点

  - name: 🇹🇼 台湾
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - 🚀 节点

  - name: 🇸🇬 新加坡
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - 🚀 节点

  - name: 🇺🇸 美国
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - 🚀 节点

  - name: 🇯🇵 日本
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - 🚀 节点

  # 场景分流
  - name: 📈 加密货币
    type: select
    proxies:
      - 🇸🇬 新加坡
      - 🇭🇰 香港
      - 🇺🇸 美国
      - 🚀 手动切换

  - name: 🤖 AI平台
    type: select
    proxies:
      - 🇺🇸 美国
      - 🇸🇬 新加坡
      - 🚀 手动切换

  - name: 📺 流媒体
    type: select
    proxies:
      - 🇸🇬 新加坡
      - 🇹🇼 台湾
      - 🇭🇰 香港
      - 🚀 手动切换

  - name: 📊 TradingView
    type: select
    proxies:
      - 🇸🇬 新加坡
      - 🇭🇰 香港
      - 🇺🇸 美国
      - 🚀 手动切换

  - name: 📱 社交媒体
    type: select
    proxies:
      - 🇭🇰 香港
      - 🇺🇸 美国
      - 🚀 手动切换

  - name: 🛒 购物支付
    type: select
    proxies:
      - 🇺🇸 美国
      - 🇭🇰 香港
      - 🚀 手动切换

  - name: 🏦 海外银行
    type: select
    proxies:
      - 🇭🇰 香港
      - 🇺🇸 美国
      - 🚀 手动切换

  - name: 🎮 游戏平台
    type: select
    proxies:
      - 🇯🇵 日本
      - 🇭🇰 香港
      - 🚀 手动切换

  # 基础设施
  - name: 🍎 苹果服务
    type: select
    proxies:
      - DIRECT
      - 🇺🇸 美国
      - 🇭🇰 香港

  - name: Ⓜ️ 微软服务
    type: select
    proxies:
      - DIRECT
      - 🇺🇸 美国

  - name: 🌐 谷歌服务
    type: select
    proxies:
      - 🇺🇸 美国
      - 🇸🇬 新加坡

  # 兜底
  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
      - 🚀 手动切换

  - name: 🛑 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 手动切换
      - DIRECT

# 规则
rules:
  # 本地网络
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve

  # 国内直连
  - RULE-SET,BM7China,DIRECT
  - GEOIP,CN,DIRECT

  # 加密货币
  - RULE-SET,Binance,📈 加密货币
  - RULE-SET,OKX,📈 加密货币
  - RULE-SET,Bybit,📈 加密货币
  - RULE-SET,Bitget,📈 加密货币
  - RULE-SET,Kraken,📈 加密货币
  - RULE-SET,CoinMarketCap,📈 加密货币
  - RULE-SET,TradingView,📊 TradingView

  # AI
  - RULE-SET,OpenAI,🤖 AI平台
  - RULE-SET,Claude,🤖 AI平台
  - RULE-SET,Gemini,🤖 AI平台
  - RULE-SET,Perplexity,🤖 AI平台

  # 流媒体
  - RULE-SET,Netflix,📺 流媒体
  - RULE-SET,Disney,📺 流媒体
  - RULE-SET,YouTube,📺 流媒体
  - RULE-SET,TikTok,📺 流媒体

  # 社交
  - RULE-SET,Telegram,📱 社交媒体
  - RULE-SET,Discord,📱 社交媒体
  - RULE-SET,Twitter,📱 社交媒体

  # 购物支付
  - RULE-SET,PayPal,🛒 购物支付
  - RULE-SET,Amazon,🛒 购物支付

  # 海外银行
  - RULE-SET,BankOfAmerica,🏦 海外银行
  - RULE-SET,Chase,🏦 海外银行

  # 游戏
  - RULE-SET,Steam,🎮 游戏平台
  - RULE-SET,Epic,🎮 游戏平台
  - RULE-SET,PlayStation,🎮 游戏平台

  # 基础设施
  - RULE-SET,Google,🌐 谷歌服务
  - RULE-SET,Microsoft,Ⓜ️ 微软服务
  - RULE-SET,Apple,🍎 苹果服务

  # 广告拦截
  - RULE-SET,BanAD,🛑 广告拦截

  # 兜底
  - MATCH,🐟 漏网之鱼