# ══════════════════════════════════════════════════════════════
# rules — 规则表（从上到下，命中即停止）
#
# 顺序：本地 → 广告 → 白名单 → Apple明确规则 → 微信支付宝 →
#        国内直连 → 各场景代理规则 → GEOIP兜底 → MATCH
# ⚠️ GEOIP CN 必须在所有代理规则之后！
# ══════════════════════════════════════════════════════════════
rules:
  # ── 本地网络 ──────────────────────────────────────────────
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR6,::1/128,DIRECT,no-resolve
  - IP-CIDR6,fc00::/7,DIRECT,no-resolve

  # ── 广告拦截 ──────────────────────────────────────────────
  - RULE-SET,Advertising,🛑 广告拦截

  # ── 用户直连白名单（香港银行、海外券商）────────────────────
  - RULE-SET,MyDirect,DIRECT

  # ── 苹果 / iCloud 明确规则（补充规则库未收录的动态子域名）──
  # Apple.list 不含 p152-caldav.icloud.com 等动态子域名，需显式补充
  - DOMAIN-SUFFIX,icloud.com,🍎 苹果服务
  - DOMAIN-SUFFIX,icloud.com.cn,🍎 苹果服务
  - DOMAIN-SUFFIX,apple.com,🍎 苹果服务
  - DOMAIN-SUFFIX,cdn-apple.com,🍎 苹果服务
  - DOMAIN-SUFFIX,mzstatic.com,🍎 苹果服务
  - DOMAIN-SUFFIX,apple-cloudkit.com,🍎 苹果服务
  - DOMAIN-SUFFIX,safebrowsing.apple,🍎 苹果服务

  # ── 微信 / 支付宝明确直连 ───────────────────────────────────
  - DOMAIN-SUFFIX,weixin.qq.com,DIRECT
  - DOMAIN-SUFFIX,wx.qq.com,DIRECT
  - DOMAIN-SUFFIX,mmbiz.qpic.cn,DIRECT
  - DOMAIN-SUFFIX,mmbiz.qlogo.cn,DIRECT
  - DOMAIN-SUFFIX,res.wx.qq.com,DIRECT
  - DOMAIN-SUFFIX,alipay.com,DIRECT
  - DOMAIN-SUFFIX,alipayobjects.com,DIRECT
  - DOMAIN-SUFFIX,alipayhk.com,DIRECT
  - DOMAIN-SUFFIX,alipay.hk,DIRECT

  # ── 国内直连 ──────────────────────────────────────────────
  - RULE-SET,China,DIRECT

  # ── 加密货币 ──────────────────────────────────────────────
  - RULE-SET,Binance,📈 加密货币
  - RULE-SET,OKX,📈 加密货币
  - RULE-SET,Crypto,📈 加密货币
  - RULE-SET,Cryptocurrency,📈 加密货币

  # ── GitHub ────────────────────────────────────────────────
  - RULE-SET,GitHub,🚀 节点选择

  # ── AI 平台 ───────────────────────────────────────────────
  - RULE-SET,OpenAI,🤖 AI 平台
  - RULE-SET,Claude,🤖 AI 平台
  - RULE-SET,Gemini,🤖 AI 平台

  # ── 流媒体 ────────────────────────────────────────────────
