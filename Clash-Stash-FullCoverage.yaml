# Stash/Stash-Clash 全量配置
# 基于 Surge-Full-Overseas-FullCoverage 等效配置
# 适合重度 VPN 用户

port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: warning
external-controller: :9090

# DNS 配置
dns:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 8.8.8.8
    - 1.1.1.1
  fallback:
    - 8.8.8.8
    - 1.1.1.1
  fallback-filter:
    geoip: true

# 代理节点（使用你的订阅）
# 请在 Sub-store 中配置订阅链接
proxy-providers:
  🚀 节点:
    type: http
    url: https://sub.store/download/collection/all?target=Clash
    interval: 86400
    health-check:
      url: http://www.gstatic.com/generate_204
      interval: 300

