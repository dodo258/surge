# 代理组（扁平化，命名与规则一致）
proxy-groups:
  # ===== 主节点选择 =====
  - name: 🐟 漏网之鱼
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Final.png
    proxies:
      - 🚀 节点选择
      - DIRECT

  - name: 🚀 节点选择
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Rocket.png
    proxies:
      - ♻️ 自动选择
      - 🌐 地区锁定
      - 🚀 手动切换

  - name: 🌐 地区锁定
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png
    proxies:
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇯🇵 日本节点
      - 🇸🇬 狮城节点
      - 🇺🇲 美国节点
      - 🇰🇷 韩国节点

  - name: ♻️ 自动选择
    type: url-test
    include-all: true
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 🚀 手动切换
    type: select
    include-all: true
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Rocket.png

  # ===== 场景分流（扁平化，所有地区节点都可选择）====

  # 加密货币：所有地区可选
  - name: 📈 加密货币
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Cryptocurrency.png
    proxies:
      - 🇸🇬 狮城节点
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇰🇷 韩国节点
      - ♻️ 自动选择
      - 🚀 节点选择

  # AI：所有地区可选
  - name: 🤖 AI平台
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ChatGPT.png
    proxies:
      - 🇺🇲 美国节点
      - 🇸🇬 狮城节点
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - ♻️ 自动选择
      - 🚀 节点选择

  # 流媒体：所有地区可选（中文资源偏好）
  - name: 📺 流媒体
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Streaming.png
    proxies:
      - 🇸🇬 狮城节点
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇰🇷 韩国节点
      - ♻️ 自动选择
      - 🚀 节点选择

  # 社交媒体：所有地区可选
  - name: 📱 社交媒体
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/X.png
    proxies:
      - 🇭🇰 香港节点
      - 🇺🇲 美国节点
      - 🇸🇬 狮城节点
      - 🇹🇼 台湾节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - ♻️ 自动选择
      - 🚀 节点选择

  # 购物支付：所有地区可选
  - name: 🛒 购物支付
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/PayPal.png
    proxies:
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇰🇷 韩国节点
      - ♻️ 自动选择
      - 🚀 节点选择

  # 游戏平台：所有地区可选
  - name: 🎮 游戏平台
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Game.png
    proxies:
      - 🇯🇵 日本节点
      - 🇭🇰 香港节点
      - 🇰🇷 韩国节点
      - 🇹🇼 台湾节点
      - 🇸🇬 狮城节点
      - 🇺🇲 美国节点
      - ♻️ 自动选择
      - 🚀 节点选择

  # ===== 基础设施 =====
  - name: 🌐 谷歌服务
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google_Search.png
    proxies:
      - ♻️ 自动选择
      - 🚀 节点选择
      - 🇺🇲 美国节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - DIRECT

  - name: Ⓜ️ 微软服务
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Windows_11.png
    proxies:
      - DIRECT
      - ♻️ 自动选择
      - 🚀 节点选择
      - 🇺🇲 美国节点
      - 🇯🇵 日本节点
      - 🇸🇬 狮城节点
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点

  - name: 🍎 苹果服务
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Apple_1.png
    proxies:
      - DIRECT
      - ♻️ 自动选择
      - 🚀 节点选择
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇸🇬 狮城节点
      - 🇺🇲 美国节点
      - 🇹🇼 台湾节点

  # ===== 兜底 =====
  - name: 🎯 全球直连
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Direct.png
    proxies:
      - DIRECT
      - 🚀 节点选择
      - ♻️ 自动选择

  - name: 🛑 广告拦截
    type: select
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/AdBlack.png
    proxies:
      - REJECT
      - DIRECT

  # ===== 地区节点 =====
  - name: 🇭🇰 香港节点
    type: url-test
    include-all: true
    filter: '(?i)(🇭🇰|港|Hong|HK|香港)'
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 🇹🇼 台湾节点
    type: url-test
    include-all: true
    filter: '(?i)(🇹🇼|台|Tai|TW|台湾)'
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 🇯🇵 日本节点
    type: url-test
    include-all: true
    filter: '(?i)(🇯🇵|日|Japan|JP|日本)'
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 🇸🇬 狮城节点
    type: url-test
    include-all: true
    filter: '(?i)(🇸🇬|新|Singapore|SG|狮城)'
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 🇺🇲 美国节点
    type: url-test
    include-all: true
    filter: '(?i)(🇺🇸|美|States|US|美国)'
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 🇰🇷 韩国节点
    type: url-test
    include-all: true
    filter: '(?i)(🇰🇷|韩|Korea|KR|首尔)'
    url: http://www.gstatic.com/generate_204
    interval: 300

# 规则（命名与代理组完全一致）
rules:
  # 本地网络
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve

  # 用户直连白名单
  - RULE-SET,MyDirect,DIRECT

  # 国内直连
  - RULE-SET,BM7China,DIRECT
  - GEOIP,CN,DIRECT

  # 加密货币
  - RULE-SET,Binance,📈 加密货币
  - RULE-SET,OKX,📈 加密货币
  - RULE-SET,Crypto,📈 加密货币
  - RULE-SET,Cryptocurrency,📈 加密货币

  # AI
  - RULE-SET,OpenAI,🤖 AI平台
  - RULE-SET,Claude,🤖 AI平台
  - RULE-SET,Gemini,🤖 AI平台

  # 流媒体
  - RULE-SET,Netflix,📺 流媒体
  - RULE-SET,Disney,📺 流媒体
  - RULE-SET,YouTube,📺 流媒体
  - RULE-SET,TikTok,📺 流媒体

  # 社交媒体
  - RULE-SET,Telegram,📱 社交媒体
  - RULE-SET,Discord,📱 社交媒体
  - RULE-SET,Twitter,📱 社交媒体
  - RULE-SET,Facebook,📱 社交媒体

  # 购物支付
  - RULE-SET,PayPal,🛒 购物支付
  - RULE-SET,Amazon,🛒 购物支付
  # 注意：AliPay 和 WeChat 必须直连，否则国内支付会失败

  # 游戏
  - RULE-SET,Steam,🎮 游戏平台
  - RULE-SET,Epic,🎮 游戏平台
  - RULE-SET,PlayStation,🎮 游戏平台
  - RULE-SET,Xbox,🎮 游戏平台
  - RULE-SET,Nintendo,🎮 游戏平台

  # 基础设施
  - RULE-SET,Google,🌐 谷歌服务
  - RULE-SET,Microsoft,Ⓜ️ 微软服务
  - RULE-SET,Apple,🍎 苹果服务

  # 广告拦截
  - RULE-SET,BanAD,🛑 广告拦截

  # 兜底
  - MATCH,🐟 漏网之鱼
