# Clash-Stash 终极配置 · Ultimate Edition
# 机场：🏢 机场A / 🏢 机场B / 🏢 机场C
# VPS：🖥 MyVPS（新加坡，链式出口，搭好后取消注释相关行）
# 基于 Stash 官方文档（stash.wiki）逐字段核查

# ── 基础设置 ──────────────────────────────────────────────────
port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: warning
external-controller: :9090
ipv6: false

# ── 连接优化 ──────────────────────────────────────────────────
tcp-concurrency: 8
http-timeout: 30000

# ── DNS ──────────────────────────────────────────────────────
dns:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  # +. 前缀同时匹配根域名和所有子域名（Stash/Clash 正确写法）
  # *.前缀只匹配子域名，不含根域名本身
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.localhost"
    - "localhost.ptlogin2.qq.com"
    - "+.weixin.qq.com"
    - "+.wx.qq.com"
    - "+.alipay.com"
    - "+.taobao.com"
    - "+.jd.com"
    - "+.meituan.com"
    - "+.meituan.net"
    - "+.dianping.com"
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://dns.alidns.com/dns-query
  # nameserver-policy：高频国内域名固定走国内 DNS，比 fallback-filter 更精准快速
  nameserver-policy:
    "+.cn": 223.5.5.5
    "+.taobao.com": 223.5.5.5
    "+.tmall.com": 223.5.5.5
    "+.alipay.com": 223.5.5.5
    "+.aliyun.com": 223.5.5.5
    "+.baidu.com": 223.5.5.5
    "+.qq.com": 119.29.29.29
    "+.tencent.com": 119.29.29.29
    "+.weixin.qq.com": 119.29.29.29
    "+.jd.com": 119.29.29.29
    "+.meituan.com": 119.29.29.29
    "+.meituan.net": 119.29.29.29
    "+.bytedance.com": 119.29.29.29
  fallback:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4


# ══════════════════════════════════════════════════════════════
# proxy-providers — 机场订阅
#
# ⚠️ 需要 Clash 格式订阅链接，不能用 Surge 格式
# 获取方法：机场官网找 Clash 链接，或在链接末尾加 &target=clash
# ══════════════════════════════════════════════════════════════
proxy-providers:
  🏢 机场A:
    type: http
    url: "请填写自己的 Clash 订阅的地址。"
    interval: 3600
    path: ./providers/proxy/airport-a.yaml
    health-check:
      enable: true
      url: http://www.google.com/generate_204
      interval: 300

  🏢 机场B:
    type: http
    url: "请填写自己的 Clash 订阅的地址"
    interval: 3600
    path: ./providers/proxy/airport-b.yaml
    health-check:
      enable: true
      url: http://www.google.com/generate_204
      interval: 300

  🏢 机场C:
    type: http
    # 机场C需要向机场获取 Clash 格式订阅链接替换此处
    url: "请填写自己的 Clash 订阅的地址"
    interval: 3600
    path: ./providers/proxy/airport-c.yaml
    health-check:
      enable: true
      url: http://www.google.com/generate_204
      interval: 300


