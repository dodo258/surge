# NekoBox temporary import version
# lightweight provider-based config for easier Android import
# purpose: give friends a simpler config than the full rule-heavy Clash/Stash version

mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false

proxy-providers:
  花云机场:
    type: http
    url: "https://api-huacloud.dev/sub?target=clash&insert=true&emoji=true&udp=true&clash.doh=true&new_name=true&filename=Flower_SS.yaml&url=https%3A%2F%2Fapi.xmancdn.com%2Fosubscribe.php%3Ftoken2%3Djnyzwgvq-b96e381978yi1ieppa%26sip002%3D1"
    path: ./proxy_providers/huacloud.yaml
    interval: 21600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

  KineticBloom:
    type: http
    url: "https://cdn.kineticbloom.org/?L2Rvd25sb2FkQ29uZmlnL0NsYXNoLmFzcHg/dD1jMjAyMiZlcT13aW5kb3dzJnVyaz0zNDc4ZWJhYi0wYjA2LTRmMjUtYTE5Mi04ZGExYzg5MzU1ZjcmbW09NDE1MzIma3RtbT01eUlZZ1hKSmpOc3BxbUYlMmZmVjhHckElM2QlM2QmMTBmNTIxNTJkNDAwNGNkOQ=="
    path: ./proxy_providers/kineticbloom.yaml
    interval: 21600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  - name: 节点选择
    type: select
    use:
      - 花云机场
      - KineticBloom
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png

  - name: 自动选择
    type: url-test
    use:
      - 花云机场
      - KineticBloom
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png

  - name: 香港节点
    type: url-test
    use:
      - 花云机场
      - KineticBloom
    filter: '(?i)(🇭🇰|香港|\bHK\b|Hong\s?Kong|HongKong)'
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png

  - name: 日本节点
    type: url-test
    use:
      - 花云机场
      - KineticBloom
    filter: '(?i)(🇯🇵|日本|\bJP\b|Japan)'
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png

  - name: 新加坡节点
    type: url-test
    use:
      - 花云机场
      - KineticBloom
    filter: '(?i)(🇸🇬|新加坡|\bSG\b|Singapore)'
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png

  - name: 美国节点
    type: url-test
    use:
      - 花云机场
      - KineticBloom
    filter: '(?i)(🇺🇸|美国|\bUS\b|\bUSA\b|United\sStates|America)'
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png

rules:
  - DOMAIN-SUFFIX,api-huacloud.dev,DIRECT
  - DOMAIN-SUFFIX,api.xmancdn.com,DIRECT
  - DOMAIN-SUFFIX,cdn.kineticbloom.org,DIRECT
  - MATCH,自动选择
