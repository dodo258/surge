name: Config Validation

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
  
    steps:
    - uses: actions/checkout@v3
    
    - name: Check Surge Config
      run: |
        test -f Surge-Full-Overseas-FullCoverage.conf
        test -f Clash-Stash-FullCoverage.yaml
        echo "Config files exist"
    
    - name: Check YAML Syntax
      run: |
        python3 -c "import yaml; yaml.safe_load(open('Clash-Stash-FullCoverage.yaml'))"
        echo "YAML syntax valid"
    
    - name: Check Rules Directory
      run: |
        test -d custom-rules
        ls custom-rules/*.list
        echo "Custom rules present"
    
    - name: Summary
      run: |
        echo "Validation passed"