🤖 AI地区锁定 = select, "🇺🇲 美国节点", "🇸🇬 狮城节点"
🎬 流媒体地区锁定 = select, "🇸🇬 狮城节点", "🇯🇵 日本节点", "🇭🇰 香港节点", "🇺🇲 美国节点"
📉 TV地区锁定 = select, "🇸🇬 狮城节点", "🇯🇵 日本节点", "🇭🇰 香港节点", "🇺🇲 美国节点"
💬 社交地区锁定 = select, "🇯🇵 日本节点", "🇭🇰 香港节点", "🇸🇬 狮城节点", "🇺🇲 美国节点"
🎮 游戏地区锁定 = select, "🇯🇵 日本节点", "🇭🇰 香港节点", "🇸🇬 狮城节点", "🇺🇲 美国节点"

