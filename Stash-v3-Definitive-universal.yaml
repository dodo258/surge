# Stash adaptation generated from Surge-v3-Definitive.conf
# Source: /Users/dodo258/Desktop/Surge-v3-Definitive.conf
mode: rule
log-level: info
allow-lan: true
ipv6: false
external-controller: 0.0.0.0:9090
mixed-port: 6152

dns:
  enable: true
  ipv6: false
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
  nameserver-policy:
    '+.taobao.com': 223.5.5.5
    '+.tmall.com': 223.5.5.5
    '+.alicdn.com': 223.5.5.5
    '+.aliyun.com': 223.5.5.5
    '+.jd.com': 119.29.29.29
    '+.suning.com': 223.5.5.5
    '+.pinduoduo.com': 119.29.29.29
    '+.alipay.com': 223.5.5.5
    '+.alipayobjects.com': 223.5.5.5
    '+.qq.com': 119.29.29.29
    '+.tencent.com': 119.29.29.29
    '+.weixin.qq.com': 119.29.29.29
    '+.tencent-cloud.net': 119.29.29.29
    '+.wechat.com': 119.29.29.29
    '+.baidu.com': 223.5.5.5
    '+.baidubce.com': 223.5.5.5
    '+.bilibili.com': 119.29.29.29
    '+.hdslb.com': 119.29.29.29
    '+.zhihu.com': 119.29.29.29
    '+.douyin.com': 119.29.29.29
    '+.meituan.com': 119.29.29.29
    '+.meituan.net': 119.29.29.29
    '+.dianping.com': 119.29.29.29
    '+.ele.me': 223.5.5.5
    '+.bytedance.com': 119.29.29.29
    '+.feishu.cn': 119.29.29.29
  fake-ip-filter:
    - '*.local'
    - '*.lan'

http:
  url-rewrite:
    - ^https?://(www\.)?g\.cn https://www.google.com 302
    - ^https?://(www\.)?google\.cn https://www.google.com 302

proxy-providers:
  '🏢 机场A':
    type: http
    url: https://api-huacloud.dev/sub?target=clash&ver=4&insert=true&emoji=true&udp=true&filename=Flower.yaml&url=https%3A%2F%2Fapi.xmancdn.com%2Fosubscribe.php%3Ftoken2%3Djnyzwgvq-b96e381978yi1ieppa%26sip002%3D1
    path: ./proxy_providers/_A.yaml
    interval: 3600
  '🏢 机场B':
    type: http
    url: https://resourcemap.lol/sub?token=eEgmwsvlgJD-VduhWsFrSIePN1WczueQS-ac3moSwy0&type=clash&use=domestic&rule=default
    path: ./proxy_providers/_B.yaml
    interval: 3600

proxy-groups:
  - name: '🚀 节点选择'
    type: select
    proxies:
      - '♻️ 自动选择'
      - '🚀 手动切换'
      - '🇭🇰 香港'
      - '🇹🇼 台湾'
      - '🇯🇵 日本'
      - '🇸🇬 狮城'
      - '🇺🇲 美国'
      - '🇰🇷 韩国'
      - DIRECT


  - name: '♻️ 自动选择'
    type: url-test
    use:
      - '🏢 机场A'
      - '🏢 机场B'
    interval: 300
    tolerance: 50


  - name: '🚀 手动切换'
    type: select
    use:
      - '🏢 机场A'
      - '🏢 机场B'


  - name: '📈 加密货币'
    type: select
    proxies: ['🇸🇬 狮城','🇭🇰 香港','🇹🇼 台湾','🇯🇵 日本','🇺🇲 美国','🇰🇷 韩国']

  - name: '🤖 AI 平台'
    type: select
    proxies: ['🇺🇲 美国','🇸🇬 狮城','🇭🇰 香港','🇹🇼 台湾','🇯🇵 日本','🇰🇷 韩国']

  - name: '📺 流媒体'
    type: select
    proxies: ['🇸🇬 狮城','🇭🇰 香港','🇹🇼 台湾','🇯🇵 日本','🇺🇲 美国','🇰🇷 韩国']

  - name: '📱 社交媒体'
    type: select
    proxies: ['🇭🇰 香港','🇺🇲 美国','🇸🇬 狮城','🇹🇼 台湾','🇯🇵 日本','🇰🇷 韩国']

  - name: '💼 办公协作'
    type: select
    proxies: ['🇸🇬 狮城','🇯🇵 日本','🇭🇰 香港','🇺🇲 美国','🇹🇼 台湾','🇰🇷 韩国']

  - name: '🛒 购物支付'
    type: select
    proxies: ['🇭🇰 香港','🇹🇼 台湾','🇸🇬 狮城','🇯🇵 日本','🇺🇲 美国','🇰🇷 韩国']

  - name: '🎮 游戏平台'
    type: select
    proxies: ['🇯🇵 日本','🇭🇰 香港','🇰🇷 韩国','🇹🇼 台湾','🇸🇬 狮城','🇺🇲 美国']

  - name: '🍎 苹果服务'
    type: select
    proxies: [DIRECT,'🇭🇰 香港','🇺🇲 美国','🇯🇵 日本','🇸🇬 狮城','🇹🇼 台湾']

  - name: 'Ⓜ️ 微软服务'
    type: select
    proxies: [DIRECT,'🇺🇲 美国','🇭🇰 香港','🇯🇵 日本','🇸🇬 狮城','🇹🇼 台湾']

  - name: '🌐 谷歌服务'
    type: select
    proxies: ['🇯🇵 日本','🇸🇬 狮城','🇹🇼 台湾','🇺🇲 美国','🇭🇰 香港','♻️ 自动选择']

  - name: '🛑 广告拦截'
    type: select
    proxies: [REJECT,DIRECT]

  - name: '🐟 漏网之鱼'
    type: select
    proxies: ['🚀 节点选择',DIRECT]


  - name: '🇭🇰 香港'
    type: url-test
    use:
      - '🏢 机场A'
      - '🏢 机场B'
    filter: '(?i)(🇭🇰|香港|Hong Kong|HongKong|HK)'
    interval: 300


  - name: '🇹🇼 台湾'
    type: url-test
    use:
      - '🏢 机场A'
      - '🏢 机场B'
    filter: '(?i)(🇹🇼|台湾|Taiwan|TW)'
    interval: 300


  - name: '🇯🇵 日本'
    type: url-test
    use:
      - '🏢 机场A'
      - '🏢 机场B'
    filter: '(?i)(🇯🇵|日本|Japan|东京|大阪|Tokyo|Osaka|JP)'
    interval: 300


  - name: '🇸🇬 狮城'
    type: url-test
    use:
      - '🏢 机场A'
      - '🏢 机场B'
    filter: '(?i)(🇸🇬|新加坡|Singapore|SG|狮城)'
    interval: 300


  - name: '🇺🇲 美国'
    type: url-test
    use:
      - '🏢 机场A'
      - '🏢 机场B'
    filter: '(?i)(🇺🇸|美国|美利坚|United\s*States|USA|Los\s*Angeles|San\s*Jose|Seattle|Dallas|Chicago|New\s*York|Silicon\s*Valley|Washington)'
    interval: 300


  - name: '🇰🇷 韩国'
    type: url-test
    use:
      - '🏢 机场A'
      - '🏢 机场B'
    filter: '(?i)(🇰🇷|韩|Korea|KR|首尔)'
    interval: 300


